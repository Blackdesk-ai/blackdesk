name: Tag Release From PR

on:
  pull_request_target:
    types:
      - closed

permissions:
  contents: write
  pull-requests: read
  id-token: write

concurrency:
  group: tag-release
  cancel-in-progress: false

jobs:
  tag-release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out merged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Resolve release version
        id: version
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail

          bump=""
          case " ${LABELS} " in
            *" release:major "*) bump="major" ;;
            *" release:minor "*) bump="minor" ;;
            *" release:patch "*) bump="patch" ;;
            *" release "*) bump="patch" ;;
            *)
              echo "No release label found on PR #${PR_NUMBER}; skipping tag creation."
              exit 0
              ;;
          esac

          git fetch --tags --force

          if ! git cat-file -e "${MERGE_SHA}^{commit}" 2>/dev/null; then
            echo "Merge commit ${MERGE_SHA} is not present in the local checkout."
            exit 1
          fi

          latest_tag="$(git tag --list 'v[0-9]*' --sort=-version:refname | head -n1)"
          previous_tag="${latest_tag}"

          if [ -z "${latest_tag}" ]; then
            major=0
            minor=1
            patch=0
            previous_tag=""
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "${version}"
            case "${bump}" in
              major)
                major="$((major + 1))"
                minor=0
                patch=0
                ;;
              minor)
                minor="$((minor + 1))"
                patch=0
                ;;
              patch)
                patch="$((patch + 1))"
                ;;
            esac
          fi

          tag="v${major}.${minor}.${patch}"

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists; skipping."
            exit 0
          fi

          echo "version=${major}.${minor}.${patch}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "previous_tag=${previous_tag}" >> "${GITHUB_OUTPUT}"

      - name: Set up Go
        if: steps.version.outputs.tag != ''
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run go vet
        if: steps.version.outputs.tag != ''
        run: go vet ./...

      - name: Run test suite
        if: steps.version.outputs.tag != ''
        run: go test ./...

      - name: Create and push release tag
        if: steps.version.outputs.tag != ''
        env:
          TAG: ${{ steps.version.outputs.tag }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${TAG}" ]; then
            echo "No release tag resolved; skipping."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG} from PR #${PR_NUMBER}" "${MERGE_SHA}"
          git push origin "${TAG}"

      - name: Install rpm tooling
        if: steps.version.outputs.tag != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install cosign
        if: steps.version.outputs.tag != ''
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Check GoReleaser config
        if: steps.version.outputs.tag != ''
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check --config .goreleaser.yml

      - name: Build signed release artifacts
        if: steps.version.outputs.tag != ''
        uses: goreleaser/goreleaser-action@v6
        env:
          COSIGN_EXPERIMENTAL: "1"
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --config .goreleaser.yml

      - name: Validate release artifacts
        if: steps.version.outputs.tag != ''
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: bash ./scripts/validate_release_artifacts.sh "${VERSION}"

      - name: Write release notes
        if: steps.version.outputs.tag != ''
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "blackdesk ${VERSION}"
            echo
            echo "Automated production release from merged PR #${{ github.event.pull_request.number }}."
            echo
            echo "Commit: ${MERGE_SHA}"
            echo "Tag: ${TAG}"
            echo
            echo "Artifacts:"
            echo "- macOS archives: amd64, arm64"
            echo "- Linux archives: amd64, arm64"
            echo "- Linux packages: .deb and .rpm for amd64, arm64"
            echo "- Windows archive: amd64"
            echo "- SHA-256 checksums plus cosign sigstore bundle"
            echo
            echo "Changes:"
            if [ -n "${PREVIOUS_TAG}" ]; then
              git log --pretty=format:'- %s (%h)' "${PREVIOUS_TAG}..${MERGE_SHA}" || true
            else
              git log --pretty=format:'- %s (%h)' "${MERGE_SHA}" -n 20 || true
            fi
          } > .github-release-notes.txt

      - name: Publish GitHub release
        if: steps.version.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: blackdesk ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.event.pull_request.merge_commit_sha }}
          files: dist/*
          body_path: .github-release-notes.txt
          fail_on_unmatched_files: true
          make_latest: true
