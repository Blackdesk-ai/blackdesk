name: Release Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  preview:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install rpm tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Build snapshot artifacts
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --skip=publish --config .goreleaser.yml

      - name: Upload release preview artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blackdesk-release-preview-pr-${{ github.event.pull_request.number }}
          path: dist/*
          if-no-files-found: error
