name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  BINARY_NAME: blackdesk

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run go vet
        run: go vet ./...

      - name: Run test suite
        run: go test ./...

  release:
    runs-on: ubuntu-latest
    needs: test
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install rpm tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          previous_tag="$(git tag --list 'v[0-9]*' --sort=-version:refname | grep -vx "${tag}" | head -n1 || true)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "previous_tag=${previous_tag}" >> "${GITHUB_OUTPUT}"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Check GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check --config .goreleaser.yml

      - name: Build signed release artifacts
        uses: goreleaser/goreleaser-action@v6
        env:
          COSIGN_EXPERIMENTAL: "1"
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=publish --config .goreleaser.yml

      - name: Validate release artifacts
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: bash ./scripts/validate_release_artifacts.sh "${VERSION}"

      - name: Write release notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "blackdesk ${VERSION}"
            echo
            echo "Automated production release from tag ${TAG}."
            echo
            echo "Commit: ${GITHUB_SHA}"
            echo "Tag: ${TAG}"
            echo
            echo "Artifacts:"
            echo "- macOS archives: amd64, arm64"
            echo "- Linux archives: amd64, arm64"
            echo "- Linux packages: .deb and .rpm for amd64, arm64"
            echo "- Windows archive: amd64"
            echo "- SHA-256 checksums plus cosign sigstore bundle"
            echo
            echo "Changes:"
            if [ -n "${PREVIOUS_TAG}" ]; then
              git log --pretty=format:'- %s (%h)' "${PREVIOUS_TAG}..${GITHUB_SHA}" || true
            else
              git log --pretty=format:'- %s (%h)' "${GITHUB_SHA}" -n 20 || true
            fi
          } > .github-release-notes.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: blackdesk ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: dist/*
          body_path: .github-release-notes.txt
          fail_on_unmatched_files: true
          make_latest: true
